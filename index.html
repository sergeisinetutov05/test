<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Calculator</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

body {
    background: #2f3e4e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Inter', sans-serif;
}

/* Калькулятор */
.calculator {
    background: #111;
    padding: 20px;
    border-radius: 20px;
    width: 520px;
}

/* Дисплей */
.display {
    background: #2f3e4e;
    padding: 15px;
    padding-right: 20px;
    border-radius: 10px;
    margin-bottom: 12px;
    color: white;
    text-align: right;
}

.history {
    font-size: 14px;
    opacity: 0.7;
    min-height: 18px;
}

.result {
    font-size: 38px;
    font-weight: 600;
}

/* Кнопки */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 65px;
    font-size: 28px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.15s;
}

button:active {
    transform: scale(0.95);
}

.number { background: #2d2d2d; color: white; }
.operator { background: #ff9500; color: white; }
.equal { background: #34c759; color: white; grid-column: span 4; }
.clear { background: #ff3b30; color: white; }
.back { background: #ff9500; color: white; }

.zero {
    grid-column: span 4;
}
</style>
</head>

<body>

<div class="calculator">
    <div class="display">
        <div id="history" class="history"></div>
        <div id="result" class="result">0</div>
    </div>

    <div class="buttons">
        <button class="clear" onclick="clearAll()">C</button>
        <button class="back" onclick="backspace()">⌫</button>
        <button class="operator" onclick="setOp('/')">/</button>
        <button class="operator" onclick="setOp('*')">*</button>

        <button class="number" onclick="addNum(7)">7</button>
        <button class="number" onclick="addNum(8)">8</button>
        <button class="number" onclick="addNum(9)">9</button>
        <button class="operator" onclick="setOp('-')">-</button>

        <button class="number" onclick="addNum(4)">4</button>
        <button class="number" onclick="addNum(5)">5</button>
        <button class="number" onclick="addNum(6)">6</button>
        <button class="operator" onclick="setOp('+')">+</button>

        <button class="number" onclick="addNum(1)">1</button>
        <button class="number" onclick="addNum(2)">2</button>
        <button class="number" onclick="addNum(3)">3</button>
        <button class="number" onclick="addNum('.')">.</button>

        <button class="number zero" onclick="addNum(0)">0</button>

        <button class="equal" onclick="calc()">=</button>
    </div>
</div>

<script>
let current = "";
let prev = "";
let operator = "";
let shouldReset = false;

// цифри
function addNum(num) {
    if (shouldReset) {
        current = "";
        shouldReset = false;
    }

    current += num;
    update();
}

// операція
function setOp(op) {
    if (current === "") return;

    if (prev !== "") {
        calc();
    }

    operator = op;
    prev = current;
    shouldReset = true;

    update();
}

// =
function calc() {
    if (!prev || !current) return;

    let a = parseFloat(prev);
    let b = parseFloat(current);
    let res = 0;

    if (operator === '+') res = a + b;
    if (operator === '-') res = a - b;
    if (operator === '*') res = a * b;
    if (operator === '/') res = b !== 0 ? a / b : "Error";

    document.getElementById("history").innerText =
        prev + " " + operator + " " + current + " =";

    current = res.toString();
    prev = "";
    operator = "";

    update();
}

// очистка
function clearAll() {
    current = "";
    prev = "";
    operator = "";
    document.getElementById("history").innerText = "";
    update();
}

// backspace
function backspace() {
    current = current.slice(0, -1);
    update();
}

// оновлення
function update() {
    document.getElementById("result").innerText = current || "0";

    if (prev && operator) {
        document.getElementById("history").innerText =
            prev + " " + operator;
    }
}

// клавіатура
document.addEventListener("keydown", function(e) {

    if (e.key >= '0' && e.key <= '9') addNum(e.key);
    if (e.key === '.') addNum('.');

    if (['+', '-', '*', '/'].includes(e.key)) {
        setOp(e.key);
    }

    if (e.key === 'Enter') calc();
    if (e.key === 'Backspace') backspace();

    if (e.key === 'Escape' || e.key === 'Delete') clearAll();
});
</script>

</body>
</html>
